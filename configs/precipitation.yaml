data:
  era5_zarr_url: gs://weatherbench2/datasets/era5/1959-2022-6h-64x32_equiangular_conservative.zarr
  hres_zarr_url: gs://weatherbench2/datasets/hres/2016-2022-0012-64x32_equiangular_conservative.zarr
  variable: total_precipitation_6hr
  max_lead_time: "2 days"  # include all 6h steps up to this horizon
  time_start: "2016-01-01"
  time_end: "2020-12-31"
  lat_slice: 32
  grid_size: 32
  train_split: 0.6
  val_split: 0.2
  test_split: 0.2
  batch_size: 32

model:
  in_channels: 2       # forecast + normalised lead-time channel
  hidden_channels: 16
  out_channels: 1
  n_layers: 3

training:
  learning_rate: 1e-3
  max_epochs: 20
  accelerator: auto

mlflow:
  experiment_name: precipitation_postprocessing
